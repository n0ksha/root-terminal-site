<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOT_Terminal // $NOHUP</title>
    <style>
        :root {
            --neon-green: #39FF14;
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            text-shadow: 0 0 5px var(--neon-green);
        }

        /* CRT Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 2;
            background-size: 100% 3px;
            pointer-events: none;
            opacity: 0.2;
        }

        .terminal {
            animation: flicker 0.1s infinite;
            z-index: 1;
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background-color: var(--neon-green);
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }

        .access-panel {
            margin-top: 40px;
            border-top: 1px solid var(--neon-green);
            padding-top: 20px;
            opacity: 0; /* Starts hidden, revealed by JS */
            transition: opacity 2s ease-in;
        }

        .links a {
            color: var(--neon-green);
            text-decoration: none;
            display: block;
            margin-bottom: 12px;
            width: fit-content;
            padding: 5px;
        }

        .links a:hover {
            background-color: var(--neon-green);
            color: black;
            box-shadow: 0 0 15px var(--neon-green);
        }

        .status-tag {
            background-color: var(--neon-green);
            color: black;
            padding: 2px 8px;
            font-weight: bold;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="terminal">
    <div id="output"></div>
    <span class="cursor"></span>

    <div id="access-panel" class="access-panel">
        <p><span class="status-tag">STATUS</span> ENCRYPTED_STABILIZATION_IN_PROGRESS</p>
        <p><span class="status-tag">BREACH</span> SCHEDULED_JUNE/JULY_2026</p>
        <br>
        <div class="links">
            <a href="https://t.me/NOHUP_Portal" target="_blank">[ > ] JOIN_PORTAL_TELEGRAM</a>
            <a href="https://x.com/NOHUP_Terminal" target="_blank">[ > ] MONITOR_X_SYSTEM</a>
        </div>
    </div>
</div>

<script>
    const text = [
        "> INITIALIZING ROOT-TERMINAL.ONLINE...",
        "> DETECTING PACKETS FROM SOLANA MAINNET...",
        "> [ / ] PROCESS: $NOHUP",
        "> [ / ] PID: 001",
        "> [ / ] UPTIME: INDEFINITE",
        "> MESSAGE: THE TERMINAL THAT NEVER HANGS UP.",
        "> NO LOGS. NO MASTERS. JUST CODE.",
        "> STAND BY FOR SYSTEM BREACH... █"
    ];

    let line = 0;
    let charIndex = 0;
    const output = document.getElementById('output');
    const panel = document.getElementById('access-panel');

    function type() {
        if (line < text.length) {
            if (charIndex < text[line].length) {
                output.innerHTML += text[line].charAt(charIndex);
                charIndex++;
                setTimeout(type, 45);
            } else {
                output.innerHTML += '<br>';
                line++;
                charIndex = 0;
                setTimeout(type, 500);
            }
        } else {
            // Reveal the access panel after typing finishes
            panel.style.opacity = "1";
        }
    }
    type();
</script>

</body>
</html>
